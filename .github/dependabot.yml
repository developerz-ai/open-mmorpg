version: 2
updates:
  # Rust workspace (root Cargo.toml + all crates).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # One Bun workspace rooted at "/" (root + apps/web + packages/*). Bun uses the
  # npm ecosystem; Dependabot reads bun.lock and resolves all workspace members.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      js-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
