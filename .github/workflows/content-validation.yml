name: Content Validation

on:
  push:
    paths:
      - 'content/**'
      - 'assets/**'
      - 'crates/content-schema/**'
  pull_request:
    paths:
      - 'content/**'
      - 'assets/**'
      - 'crates/content-schema/**'

jobs:
  validate-content:
    name: Validate content and assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Validate content manifest
        run: bun scripts/validate-content.ts

      - name: Run content-schema tests
        run: cargo nextest run --package content-schema

      - name: Run content-schema benchmarks
        run: |
          cargo install critcmp || true
          cargo bench --package content-schema

  content-lint:
    name: Content JSON linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Check JSON syntax
        run: |
          find content -name '*.json' -exec bun -e 'import("fs").readFileSync(process.argv[1], "utf8")' {} \;
