name: Content Validation

on:
  push:
    paths:
      - 'content/**'
      - 'assets/**'
      - 'crates/content-schema/**'
  pull_request:
    paths:
      - 'content/**'
      - 'assets/**'
      - 'crates/content-schema/**'

jobs:
  validate-content:
    name: Validate content and assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2.81.6
        with:
          tool: nextest

      - name: Validate content manifest
        run: bun scripts/validate-content.ts

      - name: Run content-schema tests
        run: cargo nextest run --package omm-content-schema

      - name: Compile content-schema benchmarks
        run: cargo bench --package omm-content-schema --no-run

  content-lint:
    name: Content JSON linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check JSON syntax
        run: >
          find content -name '*.json' -exec
          bun -e 'try { JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8")); } catch (e) { console.error(process.argv[1] + ": " + e.message); process.exit(1); }'
          {} \;
