name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2.82.0
        with:
          tool: nextest
      - name: install bevy dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev libx11-dev pkg-config g++
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo nextest run --workspace --all-features

  rust-integration:
    name: rust (integration · live Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: omm
          POSTGRES_PASSWORD: omm
          POSTGRES_DB: omm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U omm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Yugabyte speaks the Postgres wire → dev/CI run on plain Postgres.
      TEST_DATABASE_URL: postgres://omm:omm@localhost:5432/omm_test
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2.82.0
        with:
          tool: nextest
      - name: integration tests (ignored + unit, live DB)
        run: cargo nextest run --workspace --all-features --run-ignored all

  web:
    name: web (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: lint (biome)
        run: bun run lint
      - name: typecheck
        run: bun run typecheck
      - name: test
        run: bun test
      - name: build web
        run: bun run --filter @omm/web build
