name: Feature request
description: Propose a new capability or improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Proposals are weighed against the binding decisions in [CLAUDE.md](../blob/main/CLAUDE.md) and the specs in [docs/](../tree/main/docs). Please skim those first.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's missing or painful today? Who feels it?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What you'd like to see. Be concrete.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why you set them aside.
  - type: dropdown
    id: layer
    attributes:
      label: Which layer
      description: "Core is compiled (`crates/`); content is data (`content/`). If changing a faction/class/quest needs `cargo build`, it belongs in content."
      options:
        - core (compiled — crates/apps)
        - content (data — no recompile)
        - not sure
    validations:
      required: true
  - type: dropdown
    id: contribute
    attributes:
      label: Willing to contribute?
      description: Would you like to help build it?
      options:
        - "Yes — I'd like to implement it"
        - "Maybe — with guidance"
        - "No — just proposing"
    validations:
      required: true
